name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build and unit-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init submodules (recursive, skipping broken nested ref in euler-orderflow-router)
        run: |
          # Direct submodules first
          git submodule update --init --jobs 4
          # Recurse into each one EXCEPT euler-orderflow-router — its pinned commit
          # has a malformed nested .gitmodules entry ('modules' path with no URL)
          # that breaks `--recursive`. The hook itself doesn't depend on anything
          # inside that submodule's sub-submodules, so we skip it.
          for sm in $(git config -f .gitmodules --get-regexp '^submodule\..*\.path$' | awk '{print $2}'); do
            if [ "$sm" = "contracts/euler-orderflow-router" ]; then
              echo "Skipping recursive init for $sm (known malformed nested .gitmodules)"
              continue
            fi
            git -C "$sm" submodule update --init --recursive --jobs 4
          done

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install JS deps
        run: cd scripts && npm ci || cd scripts && npm install

      - name: Forge build
        working-directory: contracts
        run: forge build --sizes

      - name: Forge test (unit only)
        working-directory: contracts
        run: forge test --no-match-path "test/*.fork.t.sol" -vv

      - name: Forge fmt check
        working-directory: contracts
        run: forge fmt --check
        continue-on-error: true
