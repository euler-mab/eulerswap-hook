[profile.default]
src = "src"
out = "out"
test = "test"
libs = ["lib"]
solc = "0.8.27"
optimizer = true
optimizer_runs = 200

remappings = [
  "forge-std/=lib/forge-std/src/",
  "openzeppelin-contracts/=lib/openzeppelin-contracts/contracts/",
  "src/=src/",
]

[rpc_endpoints]
mainnet = "${ETH_RPC_URL}"
