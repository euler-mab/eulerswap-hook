<svg xmlns="http://www.w3.org/2000/svg" width="720" height="440" viewBox="0 0 720 440" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E1117"/>
      <stop offset="1" stop-color="#070809"/>
    </linearGradient>
    <marker id="ar" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 z" fill="#4D9FF5"/>
    </marker>
  </defs>
  <rect width="720" height="440" fill="url(#bg)"/>

  <!-- Title -->
  <text x="32" y="48" fill="#FFFFFF" font-size="20" font-weight="700">Tens of $k/day of volume from $500 of equity</text>
  <text x="32" y="72" fill="#8A93A0" font-size="13">Vault credit, curve concentration, and the auction loop compound</text>

  <!-- Stage 1: Real equity -->
  <rect x="32" y="110" width="180" height="200" rx="10" fill="#11151B" stroke="#243040" stroke-width="1.5"/>
  <text x="50" y="138" fill="#8A93A0" font-size="9" letter-spacing="2" font-weight="700">STAGE 1</text>
  <text x="50" y="162" fill="#FFFFFF" font-size="14" font-weight="700">Real equity</text>
  <text x="50" y="206" fill="#D7DEE6" font-size="22" font-weight="700" font-family="ui-monospace, monospace">~$500</text>
  <text x="50" y="232" fill="#8A93A0" font-size="12">$382 USDC + $119 USDT</text>
  <text x="50" y="266" fill="#6B7480" font-size="11">What you actually risk —</text>
  <text x="50" y="282" fill="#6B7480" font-size="11">net of vault debt.</text>

  <!-- Arrow 1 -->
  <g transform="translate(212, 210)">
    <text x="34" y="-14" fill="#4D9FF5" font-size="10" text-anchor="middle" font-weight="600">96% LTV</text>
    <text x="34" y="0" fill="#8A93A0" font-size="9" text-anchor="middle">loop credit</text>
    <line x1="6" y1="18" x2="60" y2="18" stroke="#4D9FF5" stroke-width="2" marker-end="url(#ar)"/>
  </g>

  <!-- Stage 2: Per-trade capacity -->
  <rect x="280" y="110" width="180" height="200" rx="10" fill="#0F1721" stroke="#4D9FF5" stroke-width="1.5"/>
  <text x="298" y="138" fill="#4D9FF5" font-size="9" letter-spacing="2" font-weight="700">STAGE 2</text>
  <text x="298" y="162" fill="#FFFFFF" font-size="14" font-weight="700">Per-trade capacity</text>
  <text x="298" y="206" fill="#D7DEE6" font-size="22" font-weight="700" font-family="ui-monospace, monospace">~$10k</text>
  <text x="298" y="232" fill="#8A93A0" font-size="12">via collateral × LTV</text>
  <text x="298" y="266" fill="#6B7480" font-size="11">Inventory the pool can</text>
  <text x="298" y="282" fill="#6B7480" font-size="11">source or borrow in one swap.</text>

  <!-- Arrow 2 -->
  <g transform="translate(460, 210)">
    <text x="34" y="-14" fill="#4D9FF5" font-size="10" text-anchor="middle" font-weight="600">auctions</text>
    <text x="34" y="0" fill="#8A93A0" font-size="9" text-anchor="middle">recycle</text>
    <line x1="6" y1="18" x2="60" y2="18" stroke="#4D9FF5" stroke-width="2" marker-end="url(#ar)"/>
  </g>

  <!-- Stage 3: Daily throughput -->
  <rect x="528" y="110" width="160" height="200" rx="10" fill="#0F1A17" stroke="#2EE6A8" stroke-width="1.5"/>
  <text x="546" y="138" fill="#2EE6A8" font-size="9" letter-spacing="2" font-weight="700">STAGE 3</text>
  <text x="546" y="162" fill="#FFFFFF" font-size="14" font-weight="700">Daily throughput</text>
  <text x="546" y="206" fill="#D7DEE6" font-size="22" font-weight="700" font-family="ui-monospace, monospace">~$46k</text>
  <text x="546" y="232" fill="#8FBAAE" font-size="12">7-day avg, bursty</text>
  <text x="546" y="266" fill="#8FBAAE" font-size="11">$0 on quiet days,</text>
  <text x="546" y="282" fill="#8FBAAE" font-size="11">$100k+ on busy ones.</text>

  <!-- Big result row -->
  <rect x="32" y="338" width="656" height="60" rx="10" fill="#0F1A17" stroke="#2EE6A8" stroke-width="1.5"/>
  <text x="360" y="368" fill="#2EE6A8" font-size="22" font-weight="700" text-anchor="middle" font-family="ui-monospace, monospace">~95× daily turnover</text>
  <text x="360" y="386" fill="#8FBAAE" font-size="11" text-anchor="middle">Cumulative volume ≫ per-trade depth because the Dutch auction keeps inventory rotating</text>

  <text x="360" y="426" fill="#6B7480" font-size="11" text-anchor="middle">Virtual reserves ($247M) shape the slippage curve within capacity — they're not the same as quoteable depth.</text>
</svg>
