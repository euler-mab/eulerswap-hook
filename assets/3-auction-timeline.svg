<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="950" viewBox="0 0 1600 950" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E1117"/>
      <stop offset="1" stop-color="#070809"/>
    </linearGradient>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L9,5 L0,10 z" fill="#8A93A0"/>
    </marker>
    <marker id="arA" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L9,5 L0,10 z" fill="#A78BFA"/>
    </marker>
  </defs>
  <rect width="1600" height="950" fill="url(#bg)"/>

  <!-- Title -->
  <text x="100" y="100" fill="#FFFFFF" font-size="52" font-weight="700">Dutch fee-decay auction</text>
  <text x="100" y="148" fill="#8A93A0" font-size="27">Selling the rebalance to the arber as a decaying-fee opportunity</text>

  <!-- ========== TIMELINE: 5 state cards ========== -->

  <!-- Card 1: Equilibrium -->
  <rect x="80" y="220" width="280" height="220" rx="14" fill="#11151B" stroke="#243040" stroke-width="2"/>
  <text x="100" y="260" fill="#8A93A0" font-size="13" letter-spacing="2" font-weight="700">STAGE 1</text>
  <text x="100" y="290" fill="#FFFFFF" font-size="22" font-weight="700">Equilibrium</text>
  <text x="100" y="325" fill="#D7DEE6" font-size="15">Pool price = oracle</text>
  <text x="100" y="350" fill="#D7DEE6" font-size="15">Exposure ≈ 0</text>
  <text x="100" y="375" fill="#D7DEE6" font-size="15">fee = baseFee</text>
  <!-- mini visualization -->
  <line x1="120" y1="410" x2="320" y2="410" stroke="#6B7480" stroke-width="1" stroke-dasharray="2 3"/>
  <circle cx="220" cy="410" r="6" fill="#2EE6A8"/>
  <text x="220" y="430" fill="#2EE6A8" font-size="11" text-anchor="middle">pool = oracle</text>

  <!-- Card 2: Exposure builds -->
  <rect x="380" y="220" width="280" height="220" rx="14" fill="#11151B" stroke="#243040" stroke-width="2"/>
  <text x="400" y="260" fill="#8A93A0" font-size="13" letter-spacing="2" font-weight="700">STAGE 2</text>
  <text x="400" y="290" fill="#FFFFFF" font-size="22" font-weight="700">Exposure builds</text>
  <text x="400" y="325" fill="#D7DEE6" font-size="15">Swaps push reserves</text>
  <text x="400" y="350" fill="#D7DEE6" font-size="15">Exposure &gt; trigger</text>
  <text x="400" y="375" fill="#D7DEE6" font-size="15">(e.g. &gt;50% of NAV)</text>
  <line x1="420" y1="410" x2="620" y2="410" stroke="#6B7480" stroke-width="1" stroke-dasharray="2 3"/>
  <circle cx="520" cy="410" r="6" fill="#E97777"/>
  <text x="520" y="430" fill="#E97777" font-size="11" text-anchor="middle">LP net-long, drift building</text>

  <!-- Card 3: Shift -->
  <rect x="680" y="220" width="280" height="220" rx="14" fill="#15131F" stroke="#A78BFA" stroke-width="2"/>
  <text x="700" y="260" fill="#A78BFA" font-size="13" letter-spacing="2" font-weight="700">STAGE 3</text>
  <text x="700" y="290" fill="#FFFFFF" font-size="22" font-weight="700">Shift</text>
  <text x="700" y="325" fill="#D7DEE6" font-size="15">Hook shifts priceY</text>
  <text x="700" y="350" fill="#D7DEE6" font-size="15">off-market</text>
  <text x="700" y="375" fill="#D7DEE6" font-size="15">fee = ~1.5 × shift</text>
  <line x1="720" y1="410" x2="920" y2="410" stroke="#6B7480" stroke-width="1" stroke-dasharray="2 3"/>
  <circle cx="820" cy="410" r="6" fill="#6B7480"/>
  <circle cx="855" cy="410" r="6" fill="#A78BFA"/>
  <text x="838" y="430" fill="#A78BFA" font-size="11" text-anchor="middle">deliberate arb exposed</text>

  <!-- Card 4: Decay -->
  <rect x="980" y="220" width="280" height="220" rx="14" fill="#15131F" stroke="#A78BFA" stroke-width="2"/>
  <text x="1000" y="260" fill="#A78BFA" font-size="13" letter-spacing="2" font-weight="700">STAGE 4</text>
  <text x="1000" y="290" fill="#FFFFFF" font-size="22" font-weight="700">Decay</text>
  <text x="1000" y="325" fill="#D7DEE6" font-size="15">Fee falls block-by-block</text>
  <text x="1000" y="350" fill="#D7DEE6" font-size="15">Arbers wait, watch, wait</text>
  <text x="1000" y="375" fill="#D7DEE6" font-size="15">First profitable taker wins</text>
  <line x1="1020" y1="410" x2="1220" y2="410" stroke="#6B7480" stroke-width="1" stroke-dasharray="2 3"/>
  <circle cx="1120" cy="410" r="6" fill="#6B7480"/>
  <circle cx="1155" cy="410" r="6" fill="#A78BFA"/>
  <text x="1138" y="430" fill="#A78BFA" font-size="11" text-anchor="middle">arb still there, fee dropping</text>

  <!-- Card 5: Clear -->
  <rect x="1280" y="220" width="240" height="220" rx="14" fill="#0F1A17" stroke="#2EE6A8" stroke-width="2"/>
  <text x="1300" y="260" fill="#2EE6A8" font-size="13" letter-spacing="2" font-weight="700">STAGE 5</text>
  <text x="1300" y="290" fill="#FFFFFF" font-size="22" font-weight="700">Clear</text>
  <text x="1300" y="325" fill="#D7DEE6" font-size="15">Arber takes the swap</text>
  <text x="1300" y="350" fill="#D7DEE6" font-size="15">Convergence detected</text>
  <text x="1300" y="375" fill="#D7DEE6" font-size="15">Hook recenters → done</text>
  <line x1="1320" y1="410" x2="1500" y2="410" stroke="#6B7480" stroke-width="1" stroke-dasharray="2 3"/>
  <circle cx="1410" cy="410" r="6" fill="#2EE6A8"/>
  <text x="1410" y="430" fill="#2EE6A8" font-size="11" text-anchor="middle">back to neutral</text>

  <!-- ========== CHART: fee decay over time ========== -->

  <text x="100" y="510" fill="#FFFFFF" font-size="22" font-weight="700">Fee quoted over time</text>

  <g transform="translate(100, 540)">
    <!-- chart frame -->
    <line x1="0" y1="0" x2="0" y2="280" stroke="#2B313B" stroke-width="1.5"/>
    <line x1="0" y1="280" x2="1400" y2="280" stroke="#2B313B" stroke-width="1.5"/>

    <!-- y-axis labels -->
    <text x="-12" y="6" fill="#6B7480" font-size="12" text-anchor="end" font-family="ui-monospace, monospace">startingFee</text>
    <text x="-12" y="200" fill="#6B7480" font-size="12" text-anchor="end" font-family="ui-monospace, monospace">baseFee</text>
    <text x="-12" y="285" fill="#6B7480" font-size="12" text-anchor="end" font-family="ui-monospace, monospace">0</text>

    <line x1="0" y1="0" x2="1400" y2="0" stroke="#3A3038" stroke-width="1" stroke-dasharray="3 4"/>
    <line x1="0" y1="200" x2="1400" y2="200" stroke="#3A3038" stroke-width="1" stroke-dasharray="3 4"/>

    <!-- stage markers (x-axis) -->
    <g font-family="ui-monospace, monospace" font-size="11" fill="#6B7480">
      <line x1="280" y1="0" x2="280" y2="285" stroke="#2B313B" stroke-width="1" stroke-dasharray="2 3"/>
      <text x="280" y="305" text-anchor="middle">t = 0 (shift)</text>

      <line x1="540" y1="0" x2="540" y2="285" stroke="#2B313B" stroke-width="1" stroke-dasharray="2 3"/>
      <text x="540" y="305" text-anchor="middle">t = minAuctionBlocks</text>

      <line x1="1140" y1="0" x2="1140" y2="285" stroke="#2B313B" stroke-width="1" stroke-dasharray="2 3"/>
      <text x="1140" y="305" text-anchor="middle">t = clear</text>
    </g>

    <!-- flat at baseFee before shift -->
    <line x1="0" y1="200" x2="280" y2="200" stroke="#2EE6A8" stroke-width="3"/>

    <!-- jump up at shift -->
    <line x1="280" y1="200" x2="280" y2="0" stroke="#A78BFA" stroke-width="3" stroke-dasharray="2 3"/>
    <circle cx="280" cy="0" r="5" fill="#A78BFA"/>

    <!-- decay from startingFee toward baseFee (linear block decay) -->
    <line x1="280" y1="0" x2="1140" y2="180" stroke="#A78BFA" stroke-width="3"/>

    <!-- at clear: drop to baseFee (recenter, surcharge installs as floor) -->
    <line x1="1140" y1="180" x2="1140" y2="200" stroke="#A78BFA" stroke-width="2" stroke-dasharray="2 3"/>
    <circle cx="1140" cy="200" r="5" fill="#2EE6A8"/>

    <!-- after clear: flat at baseFee (+ curvature surcharge, omitted here for clarity) -->
    <line x1="1140" y1="200" x2="1400" y2="200" stroke="#2EE6A8" stroke-width="3"/>

    <!-- annotations -->
    <text x="140" y="195" fill="#2EE6A8" font-size="12" text-anchor="middle">normal mode</text>
    <text x="710" y="80" fill="#A78BFA" font-size="13" font-weight="600">fee decays linearly</text>
    <text x="710" y="100" fill="#A78BFA" font-size="13" font-weight="600">at decayPerBlock</text>
    <text x="1270" y="195" fill="#2EE6A8" font-size="12" text-anchor="middle">recentered</text>

    <!-- annotation: minAuctionBlocks gate -->
    <rect x="280" y="-20" width="260" height="22" fill="#15131F" stroke="#A78BFA" stroke-width="1" rx="4"/>
    <text x="410" y="-4" fill="#A78BFA" font-size="11" text-anchor="middle" font-weight="600">guard window — can't clear yet</text>
  </g>

  <text x="100" y="900" fill="#6B7480" font-size="18">The arb spread is the rebalance. Higher startingFee = more LP capture, longer wait. The first arber for whom (arb profit − fee − gas) &gt; 0 takes it.</text>
</svg>
