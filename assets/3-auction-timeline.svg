<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E1117"/>
      <stop offset="1" stop-color="#070809"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>

  <!-- Title -->
  <text x="60" y="78" fill="#FFFFFF" font-size="38" font-weight="700">Dutch fee-decay auction</text>
  <text x="60" y="116" fill="#8A93A0" font-size="22">Selling the rebalance to the arber as a decaying-fee opportunity.</text>

  <!-- ========== CHART ========== -->
  <g transform="translate(80, 200)">
    <!-- Chart frame -->
    <line x1="0" y1="0" x2="0" y2="300" stroke="#2B313B" stroke-width="1.5"/>
    <line x1="0" y1="300" x2="1040" y2="300" stroke="#2B313B" stroke-width="1.5"/>

    <!-- Y-axis labels -->
    <text x="-12" y="6" fill="#6B7480" font-size="13" text-anchor="end" font-family="ui-monospace, monospace">startingFee</text>
    <text x="-12" y="208" fill="#6B7480" font-size="13" text-anchor="end" font-family="ui-monospace, monospace">baseFee</text>
    <text x="-12" y="304" fill="#6B7480" font-size="13" text-anchor="end" font-family="ui-monospace, monospace">0</text>

    <!-- Y gridlines -->
    <line x1="0" y1="0" x2="1040" y2="0" stroke="#252B35" stroke-width="1" stroke-dasharray="3 4"/>
    <line x1="0" y1="200" x2="1040" y2="200" stroke="#252B35" stroke-width="1" stroke-dasharray="3 4"/>

    <!-- ===== Stage 1: Equilibrium (flat at baseFee) ===== -->
    <line x1="0" y1="200" x2="200" y2="200" stroke="#2EE6A8" stroke-width="3.5"/>

    <!-- Stage 2: Exposure builds (still flat at baseFee, but with curvature surcharge bump for context) -->
    <line x1="200" y1="200" x2="320" y2="200" stroke="#2EE6A8" stroke-width="3.5"/>

    <!-- Stage 3: Shift — jump up to startingFee -->
    <line x1="320" y1="200" x2="320" y2="0" stroke="#A78BFA" stroke-width="3" stroke-dasharray="3 4"/>
    <circle cx="320" cy="0" r="6" fill="#A78BFA"/>

    <!-- Stage 4: Decay -->
    <line x1="320" y1="0" x2="820" y2="200" stroke="#A78BFA" stroke-width="3.5"/>

    <!-- Stage 5: Clear -->
    <circle cx="820" cy="200" r="6" fill="#2EE6A8"/>
    <line x1="820" y1="200" x2="1040" y2="200" stroke="#2EE6A8" stroke-width="3.5"/>

    <!-- ===== Stage markers on x-axis ===== -->
    <g font-family="ui-monospace, monospace" font-size="12" fill="#6B7480">
      <line x1="200" y1="0" x2="200" y2="306" stroke="#252B35" stroke-width="1" stroke-dasharray="2 3"/>
      <line x1="320" y1="0" x2="320" y2="306" stroke="#252B35" stroke-width="1" stroke-dasharray="2 3"/>
      <line x1="820" y1="0" x2="820" y2="306" stroke="#252B35" stroke-width="1" stroke-dasharray="2 3"/>

      <text x="200" y="324" text-anchor="middle">trigger</text>
      <text x="320" y="324" text-anchor="middle" fill="#A78BFA">shift</text>
      <text x="820" y="324" text-anchor="middle" fill="#2EE6A8">clear</text>
    </g>

    <!-- ===== Section labels ===== -->
    <text x="100" y="180" fill="#2EE6A8" font-size="14" text-anchor="middle" font-weight="600">normal mode</text>
    <text x="260" y="180" fill="#E97777" font-size="14" text-anchor="middle" font-weight="600">exposure builds</text>
    <text x="570" y="60" fill="#A78BFA" font-size="16" font-weight="700" text-anchor="middle">fee decays linearly</text>
    <text x="570" y="82" fill="#A78BFA" font-size="13" text-anchor="middle">at decayPerBlock</text>
    <text x="930" y="180" fill="#2EE6A8" font-size="14" text-anchor="middle" font-weight="600">recentered</text>

    <!-- guard window annotation -->
    <line x1="320" y1="-20" x2="440" y2="-20" stroke="#A78BFA" stroke-width="2" stroke-dasharray="2 3"/>
    <text x="380" y="-28" fill="#A78BFA" font-size="12" text-anchor="middle">minAuctionBlocks</text>
  </g>

  <!-- ========== STAGE EXPLANATIONS BELOW ========== -->
  <g transform="translate(60, 580)">
    <text x="0" y="0" fill="#FFFFFF" font-size="22" font-weight="700">How it clears</text>

    <text x="0" y="38" fill="#C7CDD4" font-size="15"><tspan fill="#A78BFA" font-weight="700">Shift</tspan> — Pool's priceY is pushed off-market in the direction that exposes a deliberate arb. The trade that takes that arb is the rebalance.</text>
    <text x="0" y="68" fill="#C7CDD4" font-size="15"><tspan fill="#A78BFA" font-weight="700">Decay</tspan> — Fee starts at ≈1.5× the shift and falls block-by-block. Arbers wait for it to be cheap enough to be profitable net of gas.</text>
    <text x="0" y="98" fill="#C7CDD4" font-size="15"><tspan fill="#2EE6A8" font-weight="700">Clear</tspan> — First arber takes the trade; convergence detected (marginal vs oracle); hook recenters; back to normal mode with curvature surcharge.</text>
  </g>
</svg>
