<svg xmlns="http://www.w3.org/2000/svg" width="720" height="440" viewBox="0 0 720 440" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E1117"/>
      <stop offset="1" stop-color="#070809"/>
    </linearGradient>
  </defs>
  <rect width="720" height="440" fill="url(#bg)"/>

  <!-- Title -->
  <text x="32" y="48" fill="#FFFFFF" font-size="20" font-weight="700">Dutch fee-decay auction</text>
  <text x="32" y="72" fill="#8A93A0" font-size="13">Selling the rebalance to the arber as a decaying-fee opportunity.</text>

  <!-- ========== CHART ========== -->
  <g transform="translate(80, 120)">
    <!-- Chart frame -->
    <line x1="0" y1="0" x2="0" y2="200" stroke="#2B313B" stroke-width="1.2"/>
    <line x1="0" y1="200" x2="600" y2="200" stroke="#2B313B" stroke-width="1.2"/>

    <!-- Y-axis labels -->
    <text x="-8" y="6" fill="#6B7480" font-size="10" text-anchor="end" font-family="ui-monospace, monospace">startingFee</text>
    <text x="-8" y="140" fill="#6B7480" font-size="10" text-anchor="end" font-family="ui-monospace, monospace">baseFee</text>
    <text x="-8" y="204" fill="#6B7480" font-size="10" text-anchor="end" font-family="ui-monospace, monospace">0</text>

    <!-- Y gridlines -->
    <line x1="0" y1="0" x2="600" y2="0" stroke="#252B35" stroke-width="1" stroke-dasharray="2 3"/>
    <line x1="0" y1="132" x2="600" y2="132" stroke="#252B35" stroke-width="1" stroke-dasharray="2 3"/>

    <!-- Stage 1: Equilibrium -->
    <line x1="0" y1="132" x2="120" y2="132" stroke="#2EE6A8" stroke-width="3"/>

    <!-- Stage 2: Exposure builds -->
    <line x1="120" y1="132" x2="185" y2="132" stroke="#2EE6A8" stroke-width="3"/>

    <!-- Stage 3: Shift -->
    <line x1="185" y1="132" x2="185" y2="0" stroke="#A78BFA" stroke-width="2.5" stroke-dasharray="3 4"/>
    <circle cx="185" cy="0" r="5" fill="#A78BFA"/>

    <!-- Stage 4: Decay -->
    <line x1="185" y1="0" x2="475" y2="132" stroke="#A78BFA" stroke-width="3"/>

    <!-- Stage 5: Clear -->
    <circle cx="475" cy="132" r="5" fill="#2EE6A8"/>
    <line x1="475" y1="132" x2="600" y2="132" stroke="#2EE6A8" stroke-width="3"/>

    <!-- Stage markers -->
    <g font-family="ui-monospace, monospace" font-size="9" fill="#6B7480">
      <line x1="120" y1="0" x2="120" y2="204" stroke="#252B35" stroke-width="1" stroke-dasharray="2 3"/>
      <line x1="185" y1="0" x2="185" y2="204" stroke="#252B35" stroke-width="1" stroke-dasharray="2 3"/>
      <line x1="475" y1="0" x2="475" y2="204" stroke="#252B35" stroke-width="1" stroke-dasharray="2 3"/>

      <text x="120" y="218" text-anchor="middle">trigger</text>
      <text x="185" y="218" text-anchor="middle" fill="#A78BFA">shift</text>
      <text x="475" y="218" text-anchor="middle" fill="#2EE6A8">clear</text>
    </g>

    <!-- Section labels -->
    <text x="60" y="120" fill="#2EE6A8" font-size="10" text-anchor="middle" font-weight="600">normal</text>
    <text x="152" y="120" fill="#E97777" font-size="10" text-anchor="middle" font-weight="600">exposure builds</text>
    <text x="330" y="44" fill="#A78BFA" font-size="11" font-weight="700" text-anchor="middle">fee decays linearly</text>
    <text x="330" y="58" fill="#A78BFA" font-size="9" text-anchor="middle">at decayPerBlock</text>
    <text x="538" y="120" fill="#2EE6A8" font-size="10" text-anchor="middle" font-weight="600">recentered</text>

    <!-- guard window -->
    <line x1="185" y1="-16" x2="255" y2="-16" stroke="#A78BFA" stroke-width="1.5" stroke-dasharray="2 3"/>
    <text x="220" y="-22" fill="#A78BFA" font-size="9" text-anchor="middle">minAuctionBlocks</text>
  </g>

  <!-- Stage explanations -->
  <g transform="translate(32, 372)">
    <text x="0" y="0" fill="#C7CDD4" font-size="11"><tspan fill="#A78BFA" font-weight="700">Shift</tspan> — Pool's priceY is pushed off-market to expose a deliberate arb.</text>
    <text x="0" y="20" fill="#C7CDD4" font-size="11"><tspan fill="#A78BFA" font-weight="700">Decay</tspan> — Fee starts at ≈1.5× the shift and falls block-by-block.</text>
    <text x="0" y="40" fill="#C7CDD4" font-size="11"><tspan fill="#2EE6A8" font-weight="700">Clear</tspan> — Arber takes the trade; hook recenters; surcharge installs.</text>
  </g>
</svg>
