<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E1117"/>
      <stop offset="1" stop-color="#070809"/>
    </linearGradient>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L9,5 L0,10 z" fill="#6B7480"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Title -->
  <text x="100" y="100" fill="#FFFFFF" font-size="52" font-weight="700">Passive AMM LP vs. propAMM-style LP</text>
  <text x="100" y="148" fill="#8A93A0" font-size="27">Same flow. Different fee response. Different P&amp;L.</text>

  <!-- LEFT CARD: Passive -->
  <rect x="90" y="200" width="690" height="560" rx="18" fill="#11151B" stroke="#3A3038" stroke-width="2"/>
  <text x="120" y="252" fill="#E97777" font-size="24" font-weight="700" letter-spacing="1">PASSIVE CONSTANT-PRODUCT LP</text>
  <text x="120" y="285" fill="#8A93A0" font-size="20">Uniswap v2-style, one fee for every direction</text>

  <!-- Fee curve (flat) -->
  <g transform="translate(160, 340)">
    <line x1="0" y1="120" x2="450" y2="120" stroke="#6B7480" stroke-width="1.5" stroke-dasharray="3 4"/>
    <text x="-15" y="125" fill="#6B7480" font-size="13" text-anchor="end" font-family="ui-monospace, monospace">0</text>
    <line x1="225" y1="0" x2="225" y2="180" stroke="#6B7480" stroke-width="1.5" stroke-dasharray="3 4"/>
    <text x="225" y="200" fill="#6B7480" font-size="13" text-anchor="middle">oracle = marginal</text>
    <text x="450" y="200" fill="#6B7480" font-size="13" text-anchor="end">oracle &gt; marginal</text>
    <text x="0" y="200" fill="#6B7480" font-size="13" text-anchor="start">oracle &lt; marginal</text>
    <text x="-15" y="65" fill="#6B7480" font-size="13" text-anchor="end" font-family="ui-monospace, monospace">fee</text>
    <line x1="0" y1="60" x2="450" y2="60" stroke="#E97777" stroke-width="4"/>
    <text x="465" y="65" fill="#E97777" font-size="16" font-weight="600">baseFee</text>
  </g>

  <!-- Bullets -->
  <g transform="translate(120, 590)">
    <circle cx="0" cy="-5" r="4" fill="#E97777"/>
    <text x="18" y="0" fill="#C7CDD4" font-size="22">Same fee for every direction</text>
    <circle cx="0" cy="35" r="4" fill="#E97777"/>
    <text x="18" y="40" fill="#C7CDD4" font-size="22">Arbs eat the spread before the LP can react</text>
    <circle cx="0" cy="75" r="4" fill="#E97777"/>
    <text x="18" y="80" fill="#C7CDD4" font-size="22">Retail pays the same fee as toxic flow</text>
  </g>

  <!-- Outcome -->
  <rect x="120" y="700" width="630" height="44" rx="8" fill="#1F1419" stroke="#E97777" stroke-width="1.5"/>
  <text x="435" y="730" fill="#E97777" font-size="20" font-weight="700" text-anchor="middle">P&amp;L: bleeds to LVR</text>

  <!-- RIGHT CARD: DynamicFeeAuctionHook -->
  <rect x="820" y="200" width="690" height="560" rx="18" fill="#0F1A17" stroke="#2EE6A8" stroke-width="2"/>
  <text x="850" y="252" fill="#2EE6A8" font-size="24" font-weight="700" letter-spacing="1">DYNAMICFEEAUCTIONHOOK</text>
  <text x="850" y="285" fill="#8FBAAE" font-size="20">Fee adapts to direction via Uniswap-spot compass</text>

  <!-- Fee curve (asymmetric V) -->
  <g transform="translate(890, 340)">
    <line x1="0" y1="120" x2="450" y2="120" stroke="#6B7480" stroke-width="1.5" stroke-dasharray="3 4"/>
    <text x="-15" y="125" fill="#6B7480" font-size="13" text-anchor="end" font-family="ui-monospace, monospace">0</text>
    <line x1="225" y1="0" x2="225" y2="180" stroke="#6B7480" stroke-width="1.5" stroke-dasharray="3 4"/>
    <text x="225" y="200" fill="#6B7480" font-size="13" text-anchor="middle">oracle = marginal</text>
    <text x="450" y="200" fill="#6B7480" font-size="13" text-anchor="end">oracle &gt; marginal → arb</text>
    <text x="0" y="200" fill="#6B7480" font-size="13" text-anchor="start">oracle &lt; marginal → arb</text>
    <text x="-15" y="65" fill="#6B7480" font-size="13" text-anchor="end" font-family="ui-monospace, monospace">fee</text>
    <!-- left segment: descending from high (capture) to base at center -->
    <path d="M0,15 L225,60" stroke="#2EE6A8" stroke-width="4" fill="none"/>
    <!-- right segment: ascending from base at center to high (capture) -->
    <path d="M225,60 L450,15" stroke="#2EE6A8" stroke-width="4" fill="none"/>
    <text x="465" y="65" fill="#8FBAAE" font-size="16" font-weight="600">baseFee</text>
    <text x="465" y="20" fill="#2EE6A8" font-size="16" font-weight="600">capture</text>
    <text x="-15" y="20" fill="#2EE6A8" font-size="16" font-weight="600" text-anchor="end">capture</text>
  </g>

  <!-- Bullets -->
  <g transform="translate(850, 590)">
    <circle cx="0" cy="-5" r="4" fill="#2EE6A8"/>
    <text x="18" y="0" fill="#C7CDD4" font-size="22">Higher fee when AMM is offering an arb</text>
    <circle cx="0" cy="35" r="4" fill="#2EE6A8"/>
    <text x="18" y="40" fill="#C7CDD4" font-size="22">Lower fee when competing for retail flow</text>
    <circle cx="0" cy="75" r="4" fill="#2EE6A8"/>
    <text x="18" y="80" fill="#C7CDD4" font-size="22">Dutch auction kicks in on sustained exposure</text>
  </g>

  <!-- Outcome -->
  <rect x="850" y="700" width="630" height="44" rx="8" fill="#13241F" stroke="#2EE6A8" stroke-width="1.5"/>
  <text x="1165" y="730" fill="#2EE6A8" font-size="20" font-weight="700" text-anchor="middle">P&amp;L: captures arb, wins retail</text>

  <!-- Footer -->
  <text x="800" y="850" fill="#6B7480" font-size="20" text-anchor="middle">Spot oracle as a fee compass · captureRate &amp; attractRate scale the asymmetry · all rule-based, all on-chain</text>
</svg>
